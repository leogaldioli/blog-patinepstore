services:
  blog-patinepstore:
    image: blog-patinepstore:latest
    container_name: blog-patinepstore-app
    restart: unless-stopped
    ports:
      - "7013:3000"
    env_file:
      - .env.production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      easypanel:
        aliases:
          - blog-patinepstore

networks:
  easypanel:
    external: true
